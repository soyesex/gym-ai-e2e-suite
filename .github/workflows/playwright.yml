name: Playwright Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Código ─────────────────────────────────────────
      - name: Checkout e2e suite
        uses: actions/checkout@v4

      - name: Checkout gym-ai app
        uses: actions/checkout@v4
        with:
          repository: soyesex/gym-ai
          path: ../gym-ai

      # ── 2. Node.js + dependencias ─────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install e2e suite deps
        run: npm ci

      - name: Install app deps
        working-directory: ../gym-ai/gym-app
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # ── 3. Supabase local ──
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Export Supabase keys
        id: supabase-keys
        run: |
          echo "ANON_KEY=$(supabase status | grep 'anon key' | awk '{print $NF}')" >> "$GITHUB_OUTPUT"
          echo "SERVICE_ROLE_KEY=$(supabase status | grep 'service_role key' | awk '{print $NF}')" >> "$GITHUB_OUTPUT"

      # ── 4. Tests ──────────────────────────────────────────
      - name: Run Playwright
        run: npx playwright test
        env:
          CI: true
          SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase-keys.outputs.ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase-keys.outputs.SERVICE_ROLE_KEY }}

      # ── 5. Reporte (sube aunque los tests fallen) ─────────
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14